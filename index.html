<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Generated Crane WebAR Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(18, 22, 26, 0.86);
      --panel-strong: rgba(10, 13, 16, 0.94);
      --line: rgba(255,255,255,0.14);
      --text: #f5f7f8;
      --muted: #b8c0c6;
      --accent: #20c997;
      --danger: #ff6b6b;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111820;
      color: var(--text);
    }

    #app {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .topbar,
    .drive-pad,
    .panel,
    .status {
      position: fixed;
      z-index: 4;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 18px 38px rgba(0,0,0,0.24);
    }

    .topbar {
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px;
      border-radius: 8px;
    }

    .brand {
      min-width: 0;
      padding: 0 8px;
      line-height: 1.2;
    }

    .brand strong {
      display: block;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand span {
      color: var(--muted);
      font-size: 11px;
    }

    .actions,
    .views {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border-radius: 8px;
      min-width: 42px;
      min-height: 38px;
      padding: 8px 10px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    button.active,
    button:active {
      background: var(--accent);
      border-color: rgba(255,255,255,0.28);
      color: #04130f;
    }

    button.brake {
      background: rgba(255, 107, 107, 0.22);
      border-color: rgba(255, 107, 107, 0.42);
    }

    button.brake:active,
    button.brake.active {
      background: var(--danger);
      color: #210505;
    }

    .drive-pad {
      left: max(12px, env(safe-area-inset-left));
      bottom: max(12px, env(safe-area-inset-bottom));
      width: 180px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px;
      border-radius: 8px;
      background: var(--panel-strong);
    }

    .drive-pad button {
      aspect-ratio: 1;
      min-width: 0;
      min-height: 0;
      padding: 0;
      font-size: 20px;
    }

    .drive-pad .wide {
      grid-column: span 3;
      aspect-ratio: auto;
      height: 42px;
      font-size: 14px;
    }

    .panel {
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      width: min(360px, calc(100vw - 220px));
      max-height: min(56vh, 520px);
      overflow: auto;
      padding: 12px;
      border-radius: 8px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 14px;
      line-height: 1.25;
    }

    .control {
      display: grid;
      grid-template-columns: 104px 1fr 52px;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      font-size: 12px;
      color: var(--muted);
    }

    .control output {
      text-align: right;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .status {
      left: 50%;
      transform: translateX(-50%);
      bottom: max(12px, env(safe-area-inset-bottom));
      padding: 8px 10px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
      white-space: nowrap;
    }

    details {
      border-top: 1px solid var(--line);
      margin-top: 12px;
      padding-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    summary {
      cursor: pointer;
      color: var(--text);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .node-list {
      max-height: 160px;
      overflow: auto;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(0,0,0,0.24);
      line-height: 1.55;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 11px;
      white-space: pre-wrap;
    }

    .hint {
      margin: 8px 0 0;
      line-height: 1.45;
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: flex-start;
      }

      .brand {
        flex: 1 1 100%;
      }

      .actions {
        flex: 1 1 auto;
      }

      .drive-pad {
        width: 154px;
      }

      .panel {
        left: max(12px, env(safe-area-inset-left));
        right: max(12px, env(safe-area-inset-right));
        bottom: calc(max(12px, env(safe-area-inset-bottom)) + 176px);
        width: auto;
        max-height: 34vh;
      }

      .status {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <header class="topbar">
    <div class="brand">
      <strong>Generated Crane WebAR</strong>
      <span id="loadState">モデル読込中</span>
    </div>
    <div class="views" aria-label="視点切替">
      <button data-view="outside" class="active" title="車外視点">外</button>
      <button data-view="cockpit" title="運転席視点">席</button>
      <button data-view="top" title="俯瞰視点">俯</button>
    </div>
    <div class="actions">
      <button id="arButton" title="WebXR AR">AR</button>
    </div>
  </header>

  <nav class="drive-pad" aria-label="走行操作">
    <span></span>
    <button data-hold="forward" title="前進">▲</button>
    <span></span>
    <button data-hold="left" title="左折">◀</button>
    <button class="brake" data-hold="brake" title="ブレーキ">止</button>
    <button data-hold="right" title="右折">▶</button>
    <span></span>
    <button data-hold="backward" title="後進">▼</button>
    <span></span>
    <button class="wide" id="resetPose">原点復帰</button>
  </nav>

  <aside class="panel" aria-label="作業装置操作">
    <h2>作業装置</h2>
    <label class="control">大きさ
      <input id="scale" type="range" min="0.1" max="3" value="1" step="0.01">
      <output id="scaleOut">1.00</output>
    </label>
    <label class="control">旋回台
      <input id="slew" type="range" min="-180" max="180" value="0" step="1">
      <output id="slewOut">0°</output>
    </label>
    <label class="control">ブーム仰角
      <input id="boomPitch" type="range" min="-20" max="72" value="12" step="1">
      <output id="boomPitchOut">12°</output>
    </label>
    <label class="control">ブーム伸縮
      <input id="boomExtend" type="range" min="0" max="1" value="0" step="0.01">
      <output id="boomExtendOut">0%</output>
    </label>
    <label class="control">フック上下
      <input id="hook" type="range" min="-1" max="1" value="0" step="0.01">
      <output id="hookOut">0%</output>
    </label>

    <details>
      <summary>ノード確認</summary>
      <div id="nodeList" class="node-list">読込中...</div>
      <p class="hint">
        このデモはBlender生成モデルの可動ノード名へ接続済みです。前輪・旋回台・ブーム・フックを直接操作できます。
      </p>
    </details>
  </aside>

  <div class="status" id="status">ドラッグで視点回転 / UIで操作</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { ARButton } from "three/addons/webxr/ARButton.js";

    const PART_MAP = {
      frontWheels: ["FrontWheel_FL", "FrontWheel_FR"],
      turntable: "Turntable_Yaw",
      boomPitch: "BoomPitch_X",
      boomExtend: "BoomExtend_Z",
      hook: "HookHoist_Y",
      hookSwing: "HookBlock_Swing",
      cockpitAnchor: "Camera_Cockpit_View"
    };

    const app = document.querySelector("#app");
    const loadState = document.querySelector("#loadState");
    const status = document.querySelector("#status");
    const nodeList = document.querySelector("#nodeList");

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.xr.enabled = true;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111820);

    const camera = new THREE.PerspectiveCamera(54, innerWidth / innerHeight, 0.01, 500);
    camera.position.set(5.8, 3.4, 7.2);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.2, 0);

    const vehicle = new THREE.Group();
    scene.add(vehicle);

    const hemi = new THREE.HemisphereLight(0xffffff, 0x55606a, 2.4);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffffff, 2.4);
    sun.position.set(4, 8, 5);
    scene.add(sun);

    const grid = new THREE.GridHelper(18, 18, 0x7d8790, 0x29313a);
    grid.position.y = -0.02;
    scene.add(grid);

    const parts = {};
    const input = { forward: false, backward: false, left: false, right: false, brake: false };
    const state = {
      speed: 0,
      steer: 0,
      scale: 1,
      view: "outside",
      lastSlew: 0,
      hookSwing: 0,
      hookSwingVelocity: 0,
      modelReady: false
    };

    const ui = {
      scale: bindRange("scale", v => {
        state.scale = v;
        vehicle.scale.setScalar(v);
        return v.toFixed(2);
      }),
      slew: bindRange("slew", v => {
        setAngle(parts.turntable, "z", -v);
        return `${Math.round(v)}°`;
      }),
      boomPitch: bindRange("boomPitch", v => {
        setAngle(parts.boomPitch, "x", -v);
        return `${Math.round(v)}°`;
      }),
      boomExtend: bindRange("boomExtend", v => {
        if (parts.boomExtend) parts.boomExtend.position.y = 2.45 + v * 3.2;
        return `${Math.round(v * 100)}%`;
      }),
      hook: bindRange("hook", v => {
        if (parts.hook) parts.hook.position.z = v * 1.8;
        return `${Math.round(v * 100)}%`;
      })
    };

    document.querySelectorAll("[data-hold]").forEach(button => {
      const key = button.dataset.hold;
      const down = event => {
        event.preventDefault();
        input[key] = true;
        button.classList.add("active");
      };
      const up = event => {
        event.preventDefault();
        input[key] = false;
        button.classList.remove("active");
      };
      button.addEventListener("pointerdown", down);
      button.addEventListener("pointerup", up);
      button.addEventListener("pointercancel", up);
      button.addEventListener("pointerleave", up);
    });

    document.querySelectorAll("[data-view]").forEach(button => {
      button.addEventListener("click", () => {
        state.view = button.dataset.view;
        document.querySelectorAll("[data-view]").forEach(b => b.classList.toggle("active", b === button));
        applyView(true);
      });
    });

    document.querySelector("#resetPose").addEventListener("click", () => {
      vehicle.position.set(0, 0, 0);
      vehicle.rotation.set(0, 0, 0);
      state.speed = 0;
      state.steer = 0;
    });

    const arHost = document.querySelector("#arButton");
    const arButton = ARButton.createButton(renderer, {
      requiredFeatures: ["hit-test"],
      optionalFeatures: ["dom-overlay"],
      domOverlay: { root: document.body }
    });
    arButton.textContent = "AR";
    arHost.replaceWith(arButton);

    new GLTFLoader().load(
      "./webar_crane_generated.glb",
      gltf => {
        const model = gltf.scene;
        model.rotation.x = Math.PI / 2;
        vehicle.add(model);
        centerModel(model);
        cacheParts(model);
        syncControlsToModel();
        state.modelReady = true;
        loadState.textContent = "モデル読込完了";
        status.textContent = "走行・作業装置・視点切替を試せます";
        applyView(true);
      },
      progress => {
        if (progress.total) {
          const pct = Math.round((progress.loaded / progress.total) * 100);
          loadState.textContent = `モデル読込中 ${pct}%`;
        }
      },
      error => {
        console.error(error);
        loadState.textContent = "読込エラー";
        status.textContent = "ローカルサーバー経由で開いてください";
      }
    );

    const clock = new THREE.Clock();
    renderer.setAnimationLoop(() => {
      const dt = Math.min(clock.getDelta(), 0.05);
      updateDrive(dt);
      updateHookSwing(dt);
      controls.update();
      renderer.render(scene, camera);
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    function bindRange(id, formatter) {
      const inputEl = document.querySelector(`#${id}`);
      const outputEl = document.querySelector(`#${id}Out`);
      const update = () => {
        outputEl.value = formatter(Number(inputEl.value));
      };
      inputEl.addEventListener("input", update);
      update();
      return inputEl;
    }

    function centerModel(root) {
      const box = new THREE.Box3().setFromObject(root);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      root.position.sub(center);
      root.position.y += size.y / 2;
      const longest = Math.max(size.x, size.y, size.z) || 1;
      const baseScale = 4 / longest;
      vehicle.scale.setScalar(baseScale);
      state.scale = baseScale;
      ui.scale.value = baseScale.toFixed(2);
      ui.scale.dispatchEvent(new Event("input"));
      controls.target.set(0, Math.min(1.8, size.y * baseScale * 0.45), 0);
    }

    function cacheParts(root) {
      const names = [];
      root.traverse(object => {
        if (object.name) names.push(object.name);
      });
      nodeList.textContent = names.join("\n");

      parts.frontWheels = PART_MAP.frontWheels.map(name => root.getObjectByName(name)).filter(Boolean);
      parts.turntable = PART_MAP.turntable ? root.getObjectByName(PART_MAP.turntable) : null;
      parts.boomPitch = PART_MAP.boomPitch ? root.getObjectByName(PART_MAP.boomPitch) : null;
      parts.boomExtend = PART_MAP.boomExtend ? root.getObjectByName(PART_MAP.boomExtend) : null;
      parts.hook = PART_MAP.hook ? root.getObjectByName(PART_MAP.hook) : null;
      parts.hookSwing = PART_MAP.hookSwing ? root.getObjectByName(PART_MAP.hookSwing) : null;
      parts.cockpitAnchor = PART_MAP.cockpitAnchor ? root.getObjectByName(PART_MAP.cockpitAnchor) : null;
    }

    function syncControlsToModel() {
      for (const inputEl of Object.values(ui)) {
        inputEl.dispatchEvent(new Event("input"));
      }
    }

    function updateDrive(dt) {
      const accel = input.forward ? 1.4 : input.backward ? -1.1 : 0;
      state.speed += accel * dt;
      state.speed *= input.brake ? Math.pow(0.06, dt) : Math.pow(0.68, dt);
      state.speed = THREE.MathUtils.clamp(state.speed, -1.4, 1.8);

      const targetSteer = input.left ? 1 : input.right ? -1 : 0;
      state.steer = THREE.MathUtils.damp(state.steer, targetSteer, 9, dt);
      const steerAngle = state.steer * THREE.MathUtils.degToRad(28);

      for (const wheel of parts.frontWheels || []) {
        wheel.rotation.z = -steerAngle;
      }

      vehicle.rotation.y += state.speed * state.steer * 0.55 * dt;
      vehicle.position.x += Math.sin(vehicle.rotation.y) * state.speed * dt;
      vehicle.position.z += Math.cos(vehicle.rotation.y) * state.speed * dt;

      if (state.view !== "outside") applyView(false);
    }

    function updateHookSwing(dt) {
      const slew = Number(ui.slew.value);
      const slewVelocity = (slew - state.lastSlew) / Math.max(dt, 0.001);
      state.lastSlew = slew;
      const force = THREE.MathUtils.clamp(slewVelocity / 180, -1, 1);
      state.hookSwingVelocity += force * dt * 1.8;
      state.hookSwingVelocity -= state.hookSwing * dt * 4.2;
      state.hookSwingVelocity *= Math.pow(0.35, dt);
      state.hookSwing += state.hookSwingVelocity;

      if (parts.hookSwing) {
        parts.hookSwing.rotation.z = state.hookSwing;
      }
    }

    function applyView(animate) {
      const target = new THREE.Vector3();
      vehicle.getWorldPosition(target);

      if (state.view === "top") {
        camera.position.set(target.x, target.y + 9, target.z + 0.01);
        controls.target.copy(target);
      } else if (state.view === "cockpit") {
        const local = parts.cockpitAnchor ? parts.cockpitAnchor.getWorldPosition(new THREE.Vector3()) : new THREE.Vector3(0, 1.5, 1.1).applyMatrix4(vehicle.matrixWorld);
        const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(vehicle.quaternion);
        camera.position.copy(local);
        controls.target.copy(local.add(forward.multiplyScalar(4)));
      } else {
        const offset = new THREE.Vector3(4.6, 2.8, 6.2).applyAxisAngle(new THREE.Vector3(0, 1, 0), vehicle.rotation.y);
        camera.position.copy(target).add(offset);
        controls.target.copy(target).add(new THREE.Vector3(0, 1.2, 0));
      }

      if (!animate) camera.updateProjectionMatrix();
    }

    function setAngle(object, axis, degrees) {
      if (!object) return;
      object.rotation[axis] = THREE.MathUtils.degToRad(degrees);
    }
  </script>
</body>
</html>
