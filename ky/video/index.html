<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>クレーン車KY動画 ダウンロード</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111820;
      color: #f5f7f8;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    main {
      width: min(720px, 100%);
    }

    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }

    p {
      color: #c4cbd1;
      line-height: 1.7;
      margin: 0 0 16px;
    }

    video {
      width: 100%;
      border-radius: 8px;
      background: #000;
      margin: 8px 0 18px;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    a {
      display: block;
      text-align: center;
      text-decoration: none;
      font-weight: 700;
      border-radius: 8px;
      padding: 14px 16px;
      color: #04130f;
      background: #20c997;
    }

    .secondary {
      color: #f5f7f8;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.16);
    }

    .note {
      font-size: 13px;
      color: #aeb7bf;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>クレーン車KY動画</h1>
    <p>キャプション入り動画をiPhoneで確認・保存できます。</p>

    <video controls playsinline preload="metadata" src="./crane-ky-captioned.mp4"></video>

    <div class="actions">
      <a href="./crane-ky-captioned.mp4" download>動画をダウンロード</a>
      <a class="secondary" href="../">KYデモへ戻る</a>
    </div>

    <p class="note">iPhoneで保存する場合は、動画を開いた後に共有ボタンから「ビデオを保存」または「ファイルに保存」を選択してください。</p>
  </main>
</body>
</html>
