<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>クレーン車KY動画 ダウンロード</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111820;
      color: #f5f7f8;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    main {
      width: min(720px, 100%);
    }

    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }

    p, li {
      color: #c4cbd1;
      line-height: 1.7;
    }

    video {
      width: 100%;
      border-radius: 8px;
      background: #000;
      margin: 8px 0 18px;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin: 16px 0;
    }

    a {
      display: block;
      text-align: center;
      text-decoration: none;
      font-weight: 700;
      border-radius: 8px;
      padding: 14px 16px;
      color: #04130f;
      background: #20c997;
    }

    .secondary {
      color: #f5f7f8;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.16);
    }

    .note {
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>クレーン車KY動画</h1>
    <p>iPhoneで保存しやすいように、ZIP版とMP4版を用意しています。</p>

    <video controls playsinline preload="metadata" src="./crane-ky-captioned.mp4"></video>

    <div class="actions">
      <a href="./crane-ky-captioned.zip">ZIPをダウンロード（iPhone向け）</a>
      <a class="secondary" href="./crane-ky-captioned.mp4">MP4を開く</a>
      <a class="secondary" href="../">KYデモへ戻る</a>
    </div>

    <div class="note">
      <strong>iPhoneでの保存方法</strong>
      <ol>
        <li>「ZIPをダウンロード」を押します。</li>
        <li>確認が出たら「ダウンロード」を選びます。</li>
        <li>Safari右上または下部のダウンロード表示から、ファイルAppに保存できます。</li>
      </ol>
      <p>MP4を直接保存する場合は、「MP4を開く」後に共有ボタンから「ビデオを保存」または「ファイルに保存」を選択してください。</p>
    </div>
  </main>
</body>
</html>
